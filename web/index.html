<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llm-fit</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 24px; max-width: 900px; }
    .row { display:flex; gap:12px; margin-bottom: 12px; flex-wrap: wrap; }
    input, select, button { padding:8px; }
    .card { border:1px solid #ddd; border-radius:10px; padding:12px; margin:10px 0; }
  </style>
</head>
<body>
  <h1>llm-fit</h1>
  <p>Can my laptop run this model? Get fit + speed estimate instantly.</p>
  <div class="row">
    <input id="ram" type="number" value="16" min="4" />
    <input id="vram" type="number" value="8" min="0" />
    <select id="cpu"><option>low</option><option selected>mid</option><option>high</option></select>
    <select id="platform"><option selected>apple-silicon</option><option>nvidia</option><option>amd</option><option>cpu</option></select>
    <button id="go">Estimate</button>
  </div>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    async function run() {
      const ram = document.getElementById('ram').value;
      const vram = document.getElementById('vram').value;
      const cpu = document.getElementById('cpu').value;
      const platform = document.getElementById('platform').value;
      const r = await fetch(`/api/fit?ram=${ram}&vram=${vram}&cpu=${cpu}&platform=${platform}`);
      const { data } = await r.json();
      results.innerHTML = data.map(d => `<div class="card"><b>${d.status} ${d.name}</b><br/>~${d.estTokSec} tok/s • min VRAM ${d.minVramGB}GB<br/><code>${d.cmd}</code><br/>${d.reason}</div>`).join('');
    }
    document.getElementById('go').onclick = run;
    run();
  </script>
</body>
</html>
