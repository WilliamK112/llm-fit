<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>llm-fit progress</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 24px; max-width: 900px; }
    .row { margin: 10px 0; font-size: 20px; }
    .muted { color: #666; font-size: 14px; }
    pre { background: #111; color: #eaeaea; padding: 14px; border-radius: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>llm-fit sprint progress</h1>
  <div class="muted">Auto-refresh every 10s</div>
  <div id="build" class="row"></div>
  <div id="launch" class="row"></div>
  <div id="stars" class="row"></div>
  <h3>Tracker file</h3>
  <pre id="raw"></pre>

  <script>
    async function refresh() {
      const r = await fetch('/api/progress');
      const p = await r.json();
      document.getElementById('build').textContent = p.build;
      document.getElementById('launch').textContent = p.launch;
      document.getElementById('stars').textContent = p.stars;
      document.getElementById('raw').textContent = p.markdown;
    }
    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
